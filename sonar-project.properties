sonar.projectKey=PPL-BRIN-2025_pantautular-be-2025
sonar.organization=ppl-brin-2025
sonar.sourceEncoding=UTF-8

# Make sure Sonar “sees” all your Python sources
sonar.sources=.
sonar.tests=.
sonar.inclusions=**/*.py
# Optional: exclude migrations and settings if you don’t want them in coverage gates
sonar.exclusions=**/migrations/**, **/manage.py, **/settings.py

# Coverage report generated in the job above
sonar.python.coverage.reportPaths=coverage.xml

# Define the baseline for “new code” (otherwise PRs can look weird)
sonar.newCode.referenceBranch=main

sonar.projectKey=PPL-BRIN-2025_pantautular-be-2025
sonar.organization=ppl-brin-2025
sonar.sourceEncoding=UTF-8

# Source layout
sonar.sources=admin_feature,curator_feature,expert_user_feature
# Exclude generated/irrelevant code from coverage calculations
sonar.exclusions=**/migrations/**,**/__pycache__/**

# Python
sonar.python.version=3.12

# Coverage report produced by coverage.py (relative to repo root)
sonar.python.coverage.reportPaths=coverage.xml

# Treat "new code" relative to main (avoids whole-history baseline on staging)
sonar.newCode.referenceBranch=main

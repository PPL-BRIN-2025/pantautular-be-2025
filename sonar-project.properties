sonar.projectKey=PPL-BRIN-2025_pantautular-be-2025
sonar.organization=ppl-brin-2025
sonar.sourceEncoding=UTF-8

# ✅ Only scan admin_feature folder
sonar.sources=admin_feature

# ✅ Only look for tests inside admin_feature
sonar.tests=admin_feature
sonar.test.inclusions=**/test_*.py,**/*_test.py,**/tests/**/*.py,**/tests.py

# ✅ Point to coverage (even if it's empty right now)
sonar.python.coverage.reportPaths=coverage.xml

# ✅ Exclude everything else from scanning
sonar.exclusions=pt_backend/**,pantau_tular/**,authentication/**,hello/**,curator_feature/**,**/migrations/**,**/__pycache__/**

# ✅ Avoid 0% coverage failing the pipeline (important!)
sonar.coverage.exclusions=**
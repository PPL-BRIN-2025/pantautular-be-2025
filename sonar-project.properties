sonar.projectKey=PPL-BRIN-2025_pantautular-be-2025
sonar.organization=ppl-brin-2025

# Analyze only these apps
sonar.sources=admin_feature,curator_feature,expert_user_feature

# Mark tests by filename patterns (works across the listed source dirs)
sonar.test.inclusions=**/test_*.py,**/*_test.py,**/tests/**/*.py,**/tests.py

# Coverage XML produced by coverage.py
sonar.python.coverage.reportPaths=coverage.xml

# Encoding
sonar.sourceEncoding=UTF-8

# Exclusions (common, safe on SonarCloud)
sonar.exclusions=**/migrations/**,**/__pycache__/**,**/settings.py
sonar.coverage.exclusions=**/migrations/**,**/tests/**,**/settings.py

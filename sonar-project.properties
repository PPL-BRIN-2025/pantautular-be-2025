sonar.projectKey=PPL-BRIN-2025_pantautular-be-2025
sonar.organization=ppl-brin-2025
sonar.sourceEncoding=UTF-8

# Application code roots
sonar.sources=admin_feature,curator_feature,expert_user_feature,pt_backend

# Identify test files explicitly (they live inside the same roots)
sonar.tests=admin_feature,curator_feature,expert_user_feature,pt_backend
sonar.test.inclusions=**/tests/**,**/test_*.py,**/*_test.py,**/conftest.py

# Exclude non-prod from source analysis, too (keeps them out of "New Code")
sonar.exclusions=**/migrations/**,**/__pycache__/**,**/tests/**,**/test_*.py,**/*_test.py,**/conftest.py

# Python coverage
sonar.python.version=3.12
sonar.python.coverage.reportPaths=coverage.xml

# Evaluate new code vs main
sonar.newCode.referenceBranch=main

# (optional) If you have any auto-generated modules, exclude them from coverage expectations:
# sonar.coverage.exclusions=**/migrations/**,**/__pycache__/** 

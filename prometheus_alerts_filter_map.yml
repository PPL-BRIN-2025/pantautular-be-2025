groups:
- name: django_alerts
  rules:
  - alert: HighErrorRate
    expr: rate(django_api_errors_total[5m]) > 0.1
    for: 5m
    labels:
      severity: critical
    annotations:
      summary: "High error rate detected"
      description: "Error rate is above 0.1 per second for the last 5 minutes"

  - alert: SlowAPIResponse
    expr: histogram_quantile(0.95, rate(django_api_response_time_seconds_bucket[5m])) > 2
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "Slow API response detected"
      description: "95th percentile of API response time is above 2 seconds"

  - alert: HighCaseSearchRate
    expr: rate(django_cases_searched_total[5m]) > 10
    for: 5m
    labels:
      severity: info
    annotations:
      summary: "High case search rate"
      description: "Case search rate is above 10 per second"

  - alert: DatabaseErrors
    expr: rate(django_db_errors_total[5m]) > 0
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: "Database errors detected"
      description: "Database errors are occurring" 
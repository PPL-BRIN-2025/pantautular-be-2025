name: Build & SonarCloud Analysis

on:
  push:
    branches: [main, staging]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_db
      DJANGO_SETTINGS_MODULE: pantau_tular.settings
      PYTHONPATH: ${{ github.workspace }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage

      - name: Run tests with coverage
        run: |
          coverage erase
          # include ALL Django apps that can appear in "new code" (add more if needed)
          coverage run --branch manage.py test admin_feature curator_feature expert_user_feature pt_backend
          coverage xml -i -o coverage.xml
          coverage report -m
          echo "---- coverage.xml head ----"
          head -n 30 coverage.xml || true

      # SonarScanner CLI (host, not docker) + PR decoration + verbose logs
      - name: Set up Java (for SonarScanner CLI)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download SonarScanner CLI
        run: |
          SCANNER_VERSION=5.0.1.3006
          curl -sSL -o sonar-scanner.zip \
            https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-$SCANNER_VERSION-linux.zip
          unzip -q sonar-scanner.zip
          echo "$PWD/sonar-scanner-$SCANNER_VERSION-linux/bin" >> $GITHUB_PATH

      - name: SonarCloud Scan (with PR decoration + retry)
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ARGS="-Dsonar.host.url=https://sonarcloud.io -Dsonar.login=$SONAR_TOKEN -Dsonar.verbose=true"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            ARGS="$ARGS -Dsonar.pullrequest.key=${{ github.event.number }} \
                       -Dsonar.pullrequest.branch=${{ github.head_ref }} \
                       -Dsonar.pullrequest.base=${{ github.base_ref }}"
          fi
          # retry in case SonarCloud is briefly unavailable
          for attempt in 1 2 3; do
            sonar-scanner $ARGS && break || { echo "Retrying in 10s..."; sleep 10; }
          done

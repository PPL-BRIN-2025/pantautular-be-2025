name: Django Authentication App Test and Coverage

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

jobs:
  test_coverage:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.x
      uses: actions/setup-python@v3
      with:
        python-version: '3.x'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install coverage
    - name: Set Django settings module
      run: |
        echo "DJANGO_SETTINGS_MODULE=pantau_tular.test_settings" >> $GITHUB_ENV
    - name: Run migrations
      run: |
        python manage.py migrate
    - name: Run tests and collect coverage
      run: |
        coverage run --source=authentication manage.py test authentication.tests
        coverage xml -o coverage.xml
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage.xml
        flags: authentication
        name: authentication-coverage-${{ github.ref_name }}
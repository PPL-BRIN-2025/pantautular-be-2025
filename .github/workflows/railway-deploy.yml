name: Deploy to Railway

on:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python manage.py test --settings=pantau_tular.test_settings
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL || secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          SECRET_API_KEY: ${{ secrets.SECRET_API_KEY }}

      - name: Install Railway CLI
        run: |
          curl -fsSL https://railway.app/install.sh | sh

      - name: Set Railway environment
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.event.inputs.environment }}" == "production" ]]; then
            echo "RAILWAY_PROJECT_ID=${{ secrets.RAILWAY_PRODUCTION_PROJECT_ID }}" >> $GITHUB_ENV
            echo "Deploying to production environment"
          else
            echo "RAILWAY_PROJECT_ID=${{ secrets.RAILWAY_STAGING_PROJECT_ID }}" >> $GITHUB_ENV
            echo "Deploying to staging environment"
          fi

      - name: Link to Railway project
        run: |
          railway link --project ${{ env.RAILWAY_PROJECT_ID }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy to Railway
        run: |
          railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          
      - name: Run migrations
        run: |
          railway run python manage.py migrate
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          
      - name: Collect static files
        run: |
          railway run python manage.py collectstatic --noinput
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          
      - name: Verify deployment
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.event.inputs.environment }}" == "production" ]]; then
            echo "Deployed to Railway production environment successfully!"
          else
            echo "Deployed to Railway staging environment successfully!"
          fi
          echo "Application URL: https://$(railway show | grep 'Production URL' | awk '{print $3}')"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}